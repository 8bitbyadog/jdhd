<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADHD JRPG Productivity App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'VT323', 'Press Start 2P', monospace;
      margin: 0;
      padding: 20px;
      background-color: #f5f5f5;
      font-size: 1.2em;
      line-height: 1.5;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    .embed-instructions {
      margin-top: 20px;
      padding: 15px;
      background-color: #e0e0e0;
      border-radius: 8px;
    }
    pre {
      background-color: #2c3e50;
      color: #ecf0f1;
      padding: 15px;
      border-radius: 4px;
      overflow-x: auto;
    }
    h1, h2 {
      font-family: 'Press Start 2P', monospace;
      color: #2c3e50;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ADHD JRPG Productivity App</h1>
    <p>This is a demo page for the ADHD productivity app with JRPG-style UI.</p>
    
    <!-- The custom element will be inserted here -->
    <adhd-productivity-app></adhd-productivity-app>
    
    <div class="embed-instructions">
      <h2>Embedding Instructions</h2>
      <p>To embed this app in your Google Site, use the following HTML:</p>
      <pre><code>&lt;script src="path/to/bundle.js"&gt;&lt;/script&gt;
&lt;adhd-productivity-app&gt;&lt;/adhd-productivity-app&gt;</code></pre>
    </div>
  </div>
  
  <!-- Load the bundle -->
  <script src="build/bundle.js"></script>
</body>
</html>
